services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: eventhub-api
    environment:
      APP_ENV: ${APP_ENV:-dev}
      PORT: ${PORT:-8080}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-eventhub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-eventhub}
      DB_NAME: ${POSTGRES_DB:-eventhub}
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      ADMIN_NAME: ${ADMIN_NAME:-EventHub Admin}
      ADMIN_ROLE: ${ADMIN_ROLE:-admin}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-60}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-14}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: eventhub-worker
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-eventhub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-eventhub}
      DB_NAME: ${POSTGRES_DB:-eventhub}
      DB_SSLMODE: disable
      WORKER_HEALTH_ADDR: ":8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: eventhub-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eventhub}
      POSTGRES_DB: ${POSTGRES_DB:-eventhub}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - eventhub_pgdata:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'shared_preload_libraries=pg_stat_statements'
      - '-c'
      - 'pg_stat_statements.track=all'
      - '-c'
      - 'pg_stat_statements.max=10000'
      - '-c'
      - 'pg_stat_statements.save=on'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eventhub -d eventhub']
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: eventhub-redis
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: eventhub-jaeger
    ports:
      - '16686:16686' # Jaeger UI
      - '4317:4317' # OTLP gRPC
      - '4318:4318' #OLTP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
    - '--config.file=/etc/prometheus/prometheus.yml'
    - '--web.enable-remote-write-receiver'
  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  eventhub_pgdata:
  redis-data:
